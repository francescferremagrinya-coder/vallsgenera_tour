<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Virtual 360° | Vallsgenera</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="loading-logo"><div class="loading-v">V</div></div>
    <div class="loading-spinner"></div>
    <p>Carregant tour virtual&hellip;</p>
  </div>

  <!-- ── Sidebar drawer (escenes) ── -->
  <div id="scenes-tab" title="Escenes">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </div>
  <aside id="sidebar">
    <nav class="dept-nav" id="dept-nav"></nav>
    <div id="sidebar-footer">
      <button id="btn-map" title="La nostra ubicació">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        <span>La nostra ubicació</span>
      </button>
    </div>
  </aside>
  <div id="sidebar-overlay"></div>

  <!-- ── Main viewer ── -->
  <main id="viewer-container">
    <canvas id="panorama-canvas"></canvas>
    <div id="hotspots-overlay"></div>
    <div id="transition-overlay"></div>

    <!-- Logo overlay (mosca) -->
    <img id="logo-overlay" alt="Logo">

    <!-- Top bar -->
    <div id="top-bar">
      <div id="scene-title">Feina i Ocupació</div>
    </div>

    <!-- Info panel (for type:info hotspots) -->
    <div id="info-panel">
      <div class="info-panel-header">
        <div class="info-panel-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12.5"/>
            <circle cx="12" cy="16" r="0.8" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <h3 id="info-title"></h3>
        <button id="info-close" aria-label="Tancar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="info-panel-body">
        <p id="info-content"></p>
      </div>
    </div>

    <div id="scene-dots"></div>

    <div id="controls-hint">
      <span>Arrossega per mirar al voltant</span>
      <span class="hint-sep">&bull;</span>
      <span>Moleta per fer zoom</span>
    </div>

    <!-- Toast notificació -->
    <div id="vg-toast"></div>

    <!-- ── Bottom-right control bar ── -->
    <div id="tour-controls">
      <button id="btn-home" title="Inici (primera escena)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1z"/>
          <polyline points="9 21 9 13 15 13 15 21"/>
        </svg>
      </button>
      <button id="btn-audio" title="So" class="tc-toggle">
        <svg id="audio-icon-on" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
        <svg id="audio-icon-off" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>
      <button id="btn-vr" title="Mode VR">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 8h20v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8z"/>
          <circle cx="8.5" cy="13" r="1.5"/>
          <circle cx="15.5" cy="13" r="1.5"/>
          <path d="M10 13h4"/>
        </svg>
      </button>
      <button id="btn-snapshot" title="Captura de pantalla">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </button>
      <button id="btn-fullscreen" title="Pantalla completa">
        <svg id="fs-icon-expand" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        <svg id="fs-icon-compress" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 0 2 2v3"/>
        </svg>
      </button>
    </div>
  </main>

  <!-- ══════════════════════════════════════════
       Lightbox modal  (vídeo / imatge / link)
       ══════════════════════════════════════════ -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-overlay"></div>
    <div class="lb-modal">
      <div class="lb-header">
        <div class="lb-type-badge" id="lb-type-badge"></div>
        <h2 class="lb-title" id="lb-title"></h2>
        <button class="lb-close" id="lb-close" aria-label="Tancar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="lb-body" id="lb-body"></div>
      <div class="lb-caption" id="lb-caption"></div>
    </div>
  </div>

  <!-- ── Map modal ── -->
  <div id="map-modal" aria-hidden="true">
    <div class="map-overlay"></div>
    <div class="map-panel">
      <div class="map-header">
        <span>La nostra ubicació</span>
        <button id="map-close" aria-label="Tancar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="map-body">
        <iframe
          src="https://maps.google.com/maps?q=41.2890473,1.2530344&z=19&output=embed"
          width="100%" height="100%"
          frameborder="0" style="border:0" allowfullscreen
          loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </div>
  </div>

  <!-- ── Splash / Landing page ── -->
  <div id="splash" class="hidden">
    <div class="splash-cta-bar">
      <div class="splash-cta-pulse"></div>
      <span>Clica per comen&ccedil;ar</span>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="tour.js"></script>
</body>
</html>
