<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Virtual 360° | Vallsgenera</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="loading-logo"><div class="loading-v">V</div></div>
    <div class="loading-spinner"></div>
    <p>Carregant tour virtual&hellip;</p>
  </div>

  <!-- ── Sidebar drawer (escenes) ── -->
  <div id="scenes-tab" title="Escenes">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <path d="M3 9h18M9 21V9"/>
    </svg>
    <span>Escenes</span>
  </div>
  <aside id="sidebar">
    <nav class="dept-nav" id="dept-nav"></nav>
  </aside>
  <div id="sidebar-overlay"></div>

  <!-- ── Main viewer ── -->
  <main id="viewer-container">
    <canvas id="panorama-canvas"></canvas>
    <div id="hotspots-overlay"></div>
    <div id="transition-overlay"></div>

    <!-- Top bar -->
    <div id="top-bar">
      <div id="scene-title">Feina i Ocupació</div>

      <!-- Botó de càrrega de foto (visible en mode local, ocult quan és publicat) -->
      <label id="local-photo-btn" title="Carregar foto 360° per a aquesta escena">
        <input type="file" id="local-photo-input" accept="image/*" style="display:none">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </label>

      <button id="fullscreen-btn" aria-label="Pantalla completa">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
    </div>

    <!-- Info panel (for type:info hotspots) -->
    <div id="info-panel">
      <div class="info-panel-header">
        <div class="info-panel-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12.5"/>
            <circle cx="12" cy="16" r="0.8" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <h3 id="info-title"></h3>
        <button id="info-close" aria-label="Tancar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="info-panel-body">
        <p id="info-content"></p>
      </div>
    </div>

    <!-- Nav arrows -->
    <button id="prev-scene" class="nav-arrow" aria-label="Escena anterior">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button id="next-scene" class="nav-arrow" aria-label="Escena seg&uuml;ent">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <div id="scene-dots"></div>

    <div id="controls-hint">
      <span>Arrossega per mirar al voltant</span>
      <span class="hint-sep">&bull;</span>
      <span>Moleta per fer zoom</span>
    </div>

    <!-- ── Mode posicionament (tecla P per activar) ── -->
    <div id="pos-mode" class="hidden">
      <div class="pos-crosshair"></div>
      <div class="pos-bar">
        <span class="pos-label">MODE POSICIONAMENT</span>
        <span class="pos-coords">
          lon: <strong id="pos-lon">0</strong>
          &nbsp;&nbsp;
          lat: <strong id="pos-lat">0</strong>
        </span>
        <button id="pos-copy-btn" title="Copia les coordenades al portapapers">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copiar posició
        </button>
        <button id="pos-close-btn" title="Tancar mode posicionament">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Toast notificació -->
    <div id="pos-toast">Coordenades copiades!</div>

    <!-- Botó d'accés ràpid al mode posicionament -->
    <button id="pos-trigger" title="Mode posicionament (tecla P)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9" stroke-dasharray="2 4"/>
        <line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
  </main>

  <!-- ══════════════════════════════════════════
       Lightbox modal  (vídeo / imatge / link)
       ══════════════════════════════════════════ -->
  <div id="lightbox" role="dialog" aria-modal="true">
    <div class="lb-overlay"></div>
    <div class="lb-modal">
      <div class="lb-header">
        <div class="lb-type-badge" id="lb-type-badge"></div>
        <h2 class="lb-title" id="lb-title"></h2>
        <button class="lb-close" id="lb-close" aria-label="Tancar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="lb-body" id="lb-body"></div>
      <div class="lb-caption" id="lb-caption"></div>
    </div>
  </div>

  <!-- ── Splash / Landing page ── -->
  <div id="splash" class="hidden">
    <div class="splash-inner">
      <div class="splash-logo-box"><span class="splash-v">V</span></div>
      <h1 class="splash-title">Vallsgenera</h1>
      <p class="splash-subtitle">Institut Municipal de Desenvolupament Local · Valls</p>
      <span class="splash-badge">Tour Virtual 360°</span>
      <div class="splash-sep"></div>
      <div class="splash-tap">
        <div class="splash-tap-dot"></div>
      </div>
      <p class="splash-cta-text">Clica per começar</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="tour.js"></script>
</body>
</html>
