<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tour Virtual 360° | Vallsgenera</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading">
    <div class="loading-logo">
      <div class="loading-v">V</div>
    </div>
    <div class="loading-spinner"></div>
    <p>Carregant tour virtual&hellip;</p>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L2 8v12l12 6 12-6V8L14 2z" fill="white" opacity="0.15"/>
            <path d="M14 2L2 8l12 6 12-6L14 2z" fill="white" opacity="0.9"/>
            <path d="M2 8v12l12 6V14L2 8z" fill="white" opacity="0.7"/>
            <path d="M26 8v12l-12 6V14l12-6z" fill="white" opacity="0.5"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">Vallsgenera</span>
          <span class="logo-subtitle">Tour Virtual 360&deg;</span>
        </div>
      </div>
    </div>

    <nav class="dept-nav">
      <p class="nav-label">Departaments</p>

      <button class="dept-btn active" data-index="0">
        <span class="dept-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          </svg>
        </span>
        <span class="dept-name">Feina i Ocupació</span>
        <span class="dept-arrow">›</span>
      </button>

      <button class="dept-btn" data-index="1">
        <span class="dept-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
        </span>
        <span class="dept-name">Formació</span>
        <span class="dept-arrow">›</span>
      </button>

      <button class="dept-btn" data-index="2">
        <span class="dept-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </span>
        <span class="dept-name">Empresa i Emprenedoria</span>
        <span class="dept-arrow">›</span>
      </button>

      <button class="dept-btn" data-index="3">
        <span class="dept-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="dept-name">Col&middot;laboratori</span>
        <span class="dept-arrow">›</span>
      </button>

      <button class="dept-btn" data-index="4">
        <span class="dept-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </span>
        <span class="dept-name">Campus URV i Pacte</span>
        <span class="dept-arrow">›</span>
      </button>

      <button class="dept-btn" data-index="5">
        <span class="dept-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </span>
        <span class="dept-name">Atenció i Tràmits</span>
        <span class="dept-arrow">›</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <p>Institut Municipal de<br>Desenvolupament Local</p>
      <p class="footer-city">Valls</p>
    </div>
  </aside>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay"></div>

  <!-- Main viewer -->
  <main id="viewer-container">
    <canvas id="panorama-canvas"></canvas>

    <!-- Hotspots container -->
    <div id="hotspots-overlay"></div>

    <!-- Transition overlay -->
    <div id="transition-overlay"></div>

    <!-- Top bar -->
    <div id="top-bar">
      <button id="menu-toggle" aria-label="Obrir menú">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div id="scene-title">Feina i Ocupació</div>
      <button id="fullscreen-btn" aria-label="Pantalla completa">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
      </button>
    </div>

    <!-- Info panel -->
    <div id="info-panel">
      <div class="info-panel-header">
        <div class="info-panel-icon">
          <svg id="info-panel-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <h3 id="info-title"></h3>
        <button id="info-close" aria-label="Tancar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="info-panel-body">
        <p id="info-content"></p>
      </div>
    </div>

    <!-- Navigation arrows -->
    <button id="prev-scene" class="nav-arrow" aria-label="Escena anterior">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <button id="next-scene" class="nav-arrow" aria-label="Escena seg&uuml;ent">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>

    <!-- Scene dots -->
    <div id="scene-dots"></div>

    <!-- Controls hint -->
    <div id="controls-hint">
      <span>Arrossega per mirar al voltant</span>
      <span class="hint-sep">&bull;</span>
      <span>Moleta per fer zoom</span>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="tour.js"></script>
</body>
</html>
